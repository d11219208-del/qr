<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂單與發票管理後台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4">📋 訂單與發票管理系統</h2>

    <div class="card p-3 mb-4 shadow-sm">
        <div class="row align-items-center gy-3">
            <div class="col-auto">
                <label for="searchDate" class="col-form-label">選擇訂單日期：</label>
            </div>
            <div class="col-auto">
                <input type="date" id="searchDate" class="form-control" value="{{ search_date or '' }}">
            </div>
            <div class="col-auto">
                <button class="btn btn-primary" onclick="window.location.href='?date=' + document.getElementById('searchDate').value">📅 日期查詢</button>
            </div>

            <div class="col-auto d-none d-md-block">
                <div class="vr" style="height: 38px;"></div>
            </div>

            <div class="col-auto">
                <label for="searchInvoice" class="col-form-label">或搜尋發票號碼：</label>
            </div>
            <div class="col-auto">
                <input type="text" id="searchInvoice" class="form-control" placeholder="輸入大寫發票號碼(如: AB12345678)" value="{{ search_invoice or '' }}">
            </div>
            <div class="col-auto">
                <button class="btn btn-info text-white" onclick="window.location.href='?invoice_no=' + document.getElementById('searchInvoice').value">🔍 發票查詢</button>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>訂單編號</th>
                        <th>顧客姓名</th>
                        <th>總金額</th>
                        <th>發票號碼</th>
                        <th>發票狀態</th>
                        <th style="min-width: 250px;">操作</th>
                    </tr>
                </thead>
                <tbody>
                    {{ table_html | safe }}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 獨立作廢發票
    async function voidInvoice(invoiceNo) {
        if (!confirm(`確定要單獨作廢發票 ${invoiceNo} 嗎？作廢後無法復原！`)) return;

        try {
            const response = await fetch('/api/invoice/void', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ invoice_no: invoiceNo, reason: '後台獨立作廢' })
            });
            const result = await response.json();

            if (result.success) {
                alert('✅ 發票作廢成功！');
                window.location.reload(); 
            } else {
                alert(`❌ 作廢失敗：${result.message}`);
            }
        } catch (error) {
            alert('❌ 發生錯誤，請查看控制台');
        }
    }

    // 獨立重開發票
    async function issueInvoice(orderId) {
        if (!confirm(`確定要為訂單 #${orderId} (重)開立發票嗎？`)) return;

        try {
            const response = await fetch('/api/invoice/issue', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ order_id: orderId })
            });
            const result = await response.json();

            if (result.success) {
                alert(`✅ 發票開立成功！發票號碼為：${result.invoice_no || '請重整查看'}`);
                window.location.reload(); 
            } else {
                alert(`❌ 開立失敗：${result.message}`);
            }
        } catch (error) {
            alert('❌ 發生錯誤，請查看控制台');
        }
    }

    // 💡 核心更新：正確處理 JSON 錯誤回傳的 action 函數
    async function action(url) {
        try {
            const res = await fetch(url);
            const data = await res.json(); // 解析後端傳來的 JSON
            
            if (res.ok && data.success) {
                alert('✅ ' + (data.message || '操作成功！'));
                window.location.reload();
            } else {
                // 如果後端回傳 400 或 success: false，就會彈出這個錯誤
                alert('❌ 操作失敗：\n' + (data.message || '未知錯誤'));
            }
        } catch(err) {
            console.error(err);
            alert('❌ 操作發生錯誤，無法連線至伺服器！');
        }
    }

    // 補印單據
    function askPrintType(orderId) {
        alert(`準備補印訂單 #${orderId} 的單據 (待串接列印 API)`);
    }
</script>

</body>
</html>
